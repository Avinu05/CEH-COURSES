<!DOCTYPE html>
<html>
<head>
    <title>Search Box</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        #searchBox {
            width: 300px;
            padding: 10px;
            font-size: 16px;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            padding: 8px;
            border-bottom: 1px solid #ddd;
        }
    </style>
</head>
<body>

    <h2>Search Items</h2>

    <input type="text" id="searchBox" placeholder="Search..." onkeyup="searchItems()">

    <ul id="itemList">
        <li>Apple</li>
        <li>Banana</li>
        <li>Mango</li>
        <li>Orange</li>
        <li>Grapes</li>
        <li>Pineapple</li>
    </ul>

    <script>
        function searchItems() {
            let input = document.getElementById("searchBox").value.toLowerCase();
            let items = document.querySelectorAll("#itemList li");

            items.forEach(item => {
                if (item.textContent.toLowerCase().includes(input)) {
                    item.style.display = "";
                } else {
                    item.style.display = "none";
                }
            });
        }
    </script>

</body>
</html>
